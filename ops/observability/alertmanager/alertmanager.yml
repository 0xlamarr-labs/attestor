global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - alertname="Watchdog"
      receiver: watchdog
      repeat_interval: 1m
    - matchers:
        - severity="critical"
      receiver: critical
    - matchers:
        - severity="warning"
      receiver: warning

receivers:
  - name: default
  - name: watchdog
  - name: critical
  - name: warning

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname]
