server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: ${ATTESTOR_OBSERVABILITY_TEMPO_RETENTION_PERIOD}

metrics_generator:
  registry:
    collection_interval: 15s
    stale_duration: 15m
    external_labels:
      source: tempo
      stack: attestor
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: ${ATTESTOR_OBSERVABILITY_TEMPO_METRICS_REMOTE_WRITE_URL}
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
