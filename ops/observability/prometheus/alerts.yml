groups:
  - name: attestor-availability
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: Watchdog alert for routing-path validation
          description: Continuous synthetic alert confirming the Alertmanager routing tree is alive.

      - alert: AttestorApiDown
        expr: up{job="attestor-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Attestor API target is down
          description: Prometheus cannot scrape the Attestor metrics endpoint.

      - alert: OTelCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: OpenTelemetry Collector target is down
          description: Prometheus cannot scrape the OTel Collector metrics exporter.

      - alert: TempoDown
        expr: up{job="tempo"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tempo target is down
          description: Prometheus cannot scrape the Tempo instance backing trace storage.

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Loki target is down
          description: Prometheus cannot scrape the Loki instance backing structured logs.

  - name: attestor-traffic
    rules:
      - alert: AttestorHttp5xxBurst
        expr: sum(increase(attestor_http_requests_total{status_code=~"5.."}[10m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Attestor API is serving 5xx responses
          description: One or more Attestor routes emitted HTTP 5xx responses in the last 10 minutes.

      - alert: AttestorBillingWebhookFailures
        expr: sum(increase(attestor_billing_webhook_events_total{outcome=~"conflict|signature_invalid"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Attestor billing webhooks are failing validation or reconciliation
          description: Stripe webhook processing recorded conflicts or invalid signatures in the last 15 minutes.

  - name: attestor-slo
    rules:
      - alert: AttestorAvailabilityErrorBudgetFastBurn
        expr: attestor:slo_api_availability_burn_rate:1h > 10 and attestor:slo_api_availability_burn_rate:5m > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Attestor API is rapidly burning availability error budget
          description: Multi-window burn-rate alert indicates a severe availability regression against the 99.5% availability target.

      - alert: AttestorAvailabilityErrorBudgetSlowBurn
        expr: attestor:slo_api_availability_burn_rate:24h > 2 and attestor:slo_api_availability_burn_rate:1h > 2
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Attestor API is steadily burning availability error budget
          description: Multi-window burn-rate alert indicates a sustained availability regression against the 99.5% availability target.

      - alert: AttestorLatencyErrorBudgetFastBurn
        expr: attestor:slo_api_latency_burn_rate:1h > 10 and attestor:slo_api_latency_burn_rate:5m > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Attestor API is rapidly burning latency error budget
          description: Multi-window burn-rate alert indicates the 95% under 500ms latency objective is sharply regressing.

      - alert: AttestorLatencyErrorBudgetSlowBurn
        expr: attestor:slo_api_latency_burn_rate:24h > 2 and attestor:slo_api_latency_burn_rate:1h > 2
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Attestor API is steadily burning latency error budget
          description: Multi-window burn-rate alert indicates the 95% under 500ms latency objective is drifting out of budget.
