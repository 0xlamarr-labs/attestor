listen_addresses = '*'
wal_level = replica
archive_mode = on
archive_timeout = 60s
archive_command = 'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'
restore_command = '/etc/postgresql/restore-wal.sh %f %p'
max_wal_senders = 5
max_replication_slots = 5
hot_standby = on
