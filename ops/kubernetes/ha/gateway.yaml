apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: attestor
spec:
  gatewayClassName: managed-external
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: attestor.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: attestor-tls
