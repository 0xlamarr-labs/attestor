apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: attestor-api
spec:
  scaleTargetRef:
    name: attestor-api
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 12
  fallback:
    failureThreshold: 3
    replicas: 4
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 4
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Min
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: attestor_api_request_rate
        threshold: "40"
        activationThreshold: "5"
        query: sum(rate(attestor_http_requests_total{route!~"/api/v1/(metrics|admin/metrics|health|ready)"}[2m]))
