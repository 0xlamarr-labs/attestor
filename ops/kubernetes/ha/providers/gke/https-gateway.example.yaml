apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: attestor
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    - type: NamedAddress
      value: attestor-gateway-ip
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: attestor.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: attestor-tls
      allowedRoutes:
        namespaces:
          from: Same
