apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: attestor-api
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /api/v1/ready
        portSpecification: USE_SERVING_PORT
  targetRef:
    group: ""
    kind: Service
    name: attestor-api
