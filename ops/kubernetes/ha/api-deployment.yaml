apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestor-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: attestor-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attestor-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: ghcr.io/your-org/attestor-api:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/service/api-server.js"]
          envFrom:
            - configMapRef:
                name: attestor-runtime
          env:
            - name: ATTESTOR_HA_MODE
              value: "true"
            - name: ATTESTOR_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: redis-url
            - name: ATTESTOR_CONTROL_PLANE_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: control-plane-pg-url
            - name: ATTESTOR_BILLING_LEDGER_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: billing-ledger-pg-url
            - name: ATTESTOR_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: admin-api-key
            - name: ATTESTOR_HOSTED_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-oidc-client-secret
                  optional: true
          ports:
            - containerPort: 3700
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
