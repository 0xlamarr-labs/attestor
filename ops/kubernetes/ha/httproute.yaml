apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: attestor-api
spec:
  parentRefs:
    - name: attestor
  hostnames:
    - attestor.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: attestor-api
          port: 80
