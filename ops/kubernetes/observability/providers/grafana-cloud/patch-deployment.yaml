apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestor-otel-gateway
  namespace: attestor-observability
spec:
  template:
    spec:
      containers:
        - name: otel-collector
          env:
            - name: GRAFANA_CLOUD_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: attestor-otel-gateway-grafana-cloud
                  key: grafana-cloud-otlp-endpoint
            - name: GRAFANA_CLOUD_OTLP_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: attestor-otel-gateway-grafana-cloud
                  key: grafana-cloud-otlp-auth-header
            - name: TEMPO_OTLP_ENDPOINT
              $patch: delete
            - name: LOKI_OTLP_ENDPOINT
              $patch: delete
