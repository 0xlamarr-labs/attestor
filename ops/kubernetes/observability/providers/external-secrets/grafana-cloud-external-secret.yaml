apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: attestor-otel-gateway-grafana-cloud
  namespace: attestor-observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: REPLACE_WITH_CLUSTER_SECRET_STORE
  target:
    name: attestor-otel-gateway-grafana-cloud
    creationPolicy: Owner
  data:
    - secretKey: grafana-cloud-otlp-endpoint
      remoteRef:
        key: observability/grafana-cloud
        property: otlp_endpoint
    - secretKey: grafana-cloud-otlp-username
      remoteRef:
        key: observability/grafana-cloud
        property: username
    - secretKey: grafana-cloud-otlp-token
      remoteRef:
        key: observability/grafana-cloud
        property: token
