services:
  attestor-api:
    build: .
    command: node dist/service/api-server.js
    environment:
      PORT: "3700"
      ATTESTOR_ADMIN_API_KEY: admin-secret
      ATTESTOR_METRICS_API_KEY: metrics-secret
      OTEL_LOGS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3700:3700"
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8889:8889"
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${ATTESTOR_OBSERVABILITY_PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${ATTESTOR_OBSERVABILITY_PROMETHEUS_RETENTION_SIZE:-4GB}
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./ops/observability/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - attestor-api
      - otel-collector
      - alertmanager

  alertmanager-config-renderer:
    image: node:22-alpine
    working_dir: /workspace
    command: ["node", "scripts/render-alertmanager-config.mjs", "/generated/alertmanager.yml"]
    restart: "no"
    environment:
      ALERTMANAGER_DEFAULT_WEBHOOK_URL: ${ALERTMANAGER_DEFAULT_WEBHOOK_URL:-}
      ALERTMANAGER_CRITICAL_WEBHOOK_URL: ${ALERTMANAGER_CRITICAL_WEBHOOK_URL:-}
      ALERTMANAGER_WARNING_WEBHOOK_URL: ${ALERTMANAGER_WARNING_WEBHOOK_URL:-}
      ALERTMANAGER_EMAIL_TO: ${ALERTMANAGER_EMAIL_TO:-}
      ALERTMANAGER_EMAIL_FROM: ${ALERTMANAGER_EMAIL_FROM:-}
      ALERTMANAGER_SMARTHOST: ${ALERTMANAGER_SMARTHOST:-}
      ALERTMANAGER_SMTP_AUTH_USERNAME: ${ALERTMANAGER_SMTP_AUTH_USERNAME:-}
      ALERTMANAGER_SMTP_AUTH_PASSWORD: ${ALERTMANAGER_SMTP_AUTH_PASSWORD:-}
    volumes:
      - .:/workspace:ro
      - alertmanager-config:/generated

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - sh
      - -c
      - until [ -f /etc/alertmanager/generated/alertmanager.yml ]; do sleep 0.2; done; exec /bin/alertmanager --config.file=/etc/alertmanager/generated/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - alertmanager-config:/etc/alertmanager/generated:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    depends_on:
      - alertmanager-config-renderer

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./ops/observability/loki/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yml", "-config.expand-env=true"]
    environment:
      ATTESTOR_OBSERVABILITY_TEMPO_RETENTION_PERIOD: ${ATTESTOR_OBSERVABILITY_TEMPO_RETENTION_PERIOD:-336h}
      ATTESTOR_OBSERVABILITY_TEMPO_METRICS_REMOTE_WRITE_URL: ${ATTESTOR_OBSERVABILITY_TEMPO_METRICS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}
    volumes:
      - ./ops/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  prometheus-data:
  alertmanager-config:
  alertmanager-data:
  loki-data:
  tempo-data:
  grafana-data:
